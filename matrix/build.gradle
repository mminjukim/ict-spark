apply plugin: 'java'

repositories {
    mavenCentral()
}


dependencies {
	implementation group: 'org.apache.spark', name: 'spark-core_2.13', version: '4.1.2'
	compileOnly group: 'org.apache.spark', name: 'spark-sql_2.13', version: '4.1.2'
	implementation("com.google.guava:guava:33.5.0-jre")
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

